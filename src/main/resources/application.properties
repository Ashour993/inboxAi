spring.application.name=inboxai

# ===== DATABASE =====
spring.datasource.url=jdbc:postgresql://localhost:5432/inboxai
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ===== SECURITY (GOOGLE OAUTH) =====
spring.security.oauth2.client.registration.google.client-id=818116758553-0s4aop8a3pi4movhmv4ukn7uhuvg1o9o.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# ===== SAFETY =====
server.error.include-message=never
server.error.include-stacktrace=never